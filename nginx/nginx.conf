worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-font-ttf
               image/svg+xml font/woff font/woff2;

    # ── Rate Limit Zones ──────────────────────────────────────────
    # Auth: 5 istek/dakika per IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    # API genel: 60 istek/dakika per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/m;
    # WebSocket bağlantısı: 10 bağlantı/dakika per IP
    limit_req_zone $binary_remote_addr zone=ws_limit:10m   rate=10r/m;

    limit_req_status 429;

    # ── Upstream ──────────────────────────────────────────────────
    upstream app {
        server app:8000;
        keepalive 64;
    }

    # ── HTTP → HTTPS yönlendirme (SSL aktifse aç) ─────────────────
    # server {
    #     listen 80;
    #     server_name tradingtools.app www.tradingtools.app;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        # SSL için:
        # listen 443 ssl http2;
        # ssl_certificate     /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;

        server_name _;

        client_max_body_size 2m;

        # ── Auth endpoint'leri — sıkı rate limit ──────────────────
        location ~ ^/auth/(login|register|forgot-password) {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── WebSocket ─────────────────────────────────────────────
        location /ws {
            limit_req zone=ws_limit burst=5 nodelay;
            proxy_pass          http://app;
            proxy_http_version  1.1;
            proxy_set_header    Upgrade $http_upgrade;
            proxy_set_header    Connection "upgrade";
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;
        }

        # ── API genel ─────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Stripe webhook — rate limit yok ───────────────────────
        location /billing/webhook {
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Genel (frontend static + diğer API'ler) ───────────────
        location / {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass         http://app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── 429 özel hata sayfası ──────────────────────────────────
        error_page 429 = @too_many;
        location @too_many {
            default_type application/json;
            return 429 '{"detail":"Too many requests. Please slow down."}';
        }
    }
}
