# Fly.io configuration for CryptoTerminal
# Deploy: flyctl deploy

app = "cryptoterminal"
primary_region = "iad"  # US East (Virginia) — closest to Neon DB

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false   # don't stop — keeps connections alive
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"               # 1GB — plenty for our app
  cpu_kind = "shared"
  cpus = 1
