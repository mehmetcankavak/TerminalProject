name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Test (pytest)
        run: pytest

  build-and-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::002478776638:role/github-actions-cryptoterminal
          aws-region: eu-north-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: cryptoterminal
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg VITE_API_URL= \
            -t $REGISTRY/$REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::002478776638:role/github-actions-cryptoterminal
          aws-region: eu-north-1

      - name: Deploy to EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-0c737514120893e20 \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ec2-user/app",
              "aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 002478776638.dkr.ecr.eu-north-1.amazonaws.com",
              "docker compose pull",
              "docker compose up -d",
              "docker compose restart nginx",
              "docker image prune -f"
            ]' \
            --region eu-north-1 \
            --query 'Command.CommandId' --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id i-0c737514120893e20 \
            --region eu-north-1 || true

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id i-0c737514120893e20 \
            --region eu-north-1 \
            --output json > result.json

          cat result.json
          STATUS=$(jq -r '.Status' result.json)
          if [ "$STATUS" != "Success" ]; then
            echo "Deploy failed with status: $STATUS"
            exit 1
          fi
