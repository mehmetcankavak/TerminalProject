<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1f1a"/>
      <stop offset="100%" stop-color="#050e0b"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d992" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Glow -->
  <circle cx="200" cy="200" r="180" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#00d992" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="80"  x2="400" y2="80"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="80"  y1="0" x2="80"  y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
  </g>

  <!-- Border ring -->
  <rect x="12" y="12" width="376" height="376" rx="32" fill="none" stroke="#00d992" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Corner accents -->
  <path d="M12 60 L12 12 L60 12" fill="none" stroke="#00d992" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M340 12 L388 12 L388 60" fill="none" stroke="#00d992" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M12 340 L12 388 L60 388" fill="none" stroke="#00d992" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M340 388 L388 388 L388 340" fill="none" stroke="#00d992" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Candlestick mini chart -->
  <g opacity="0.35">
    <line x1="90" y1="155" x2="90" y2="215" stroke="#00d992" stroke-width="1.5"/>
    <rect x="84" y="165" width="12" height="28" rx="2" fill="#00d992"/>
    <line x1="114" y1="148" x2="114" y2="210" stroke="#ff3b5c" stroke-width="1.5"/>
    <rect x="108" y="158" width="12" height="30" rx="2" fill="#ff3b5c"/>
    <line x1="138" y1="152" x2="138" y2="200" stroke="#00d992" stroke-width="1.5"/>
    <rect x="132" y="160" width="12" height="22" rx="2" fill="#00d992"/>
  </g>
  <g opacity="0.35">
    <line x1="258" y1="185" x2="258" y2="245" stroke="#ff3b5c" stroke-width="1.5"/>
    <rect x="252" y="195" width="12" height="28" rx="2" fill="#ff3b5c"/>
    <line x1="282" y1="175" x2="282" y2="235" stroke="#00d992" stroke-width="1.5"/>
    <rect x="276" y="185" width="12" height="26" rx="2" fill="#00d992"/>
    <line x1="306" y1="168" x2="306" y2="222" stroke="#00d992" stroke-width="1.5"/>
    <rect x="300" y="176" width="12" height="24" rx="2" fill="#00d992"/>
  </g>

  <!-- TT Logo text -->
  <text x="200" y="222" font-family="'Courier New', monospace" font-size="96" font-weight="700" fill="#00d992" text-anchor="middle" letter-spacing="-4">TT</text>

  <!-- Bracket decorations -->
  <text x="96" y="222" font-family="'Courier New', monospace" font-size="72" font-weight="300" fill="#00d992" text-anchor="middle" opacity="0.5">[</text>
  <text x="304" y="222" font-family="'Courier New', monospace" font-size="72" font-weight="300" fill="#00d992" text-anchor="middle" opacity="0.5">]</text>

  <!-- Bottom label -->
  <text x="200" y="310" font-family="'Courier New', monospace" font-size="13" fill="#00d992" text-anchor="middle" letter-spacing="6" opacity="0.6">TERMINAL</text>

  <!-- Status dot -->
  <circle cx="200" cy="338" r="4" fill="#00d992" opacity="0.8"/>
  <circle cx="200" cy="338" r="8" fill="none" stroke="#00d992" stroke-width="1" opacity="0.3"/>
</svg>
