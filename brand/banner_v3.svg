<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <defs>
    <radialGradient id="bg" cx="25%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d2318"/>
      <stop offset="100%" stop-color="#050d08"/>
    </radialGradient>
    <radialGradient id="glowLeft" cx="18%" cy="50%" r="32%">
      <stop offset="0%" stop-color="#00d992" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#00d992" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="iconBg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00d992" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1effa0"/>
      <stop offset="100%" stop-color="#00c47a"/>
    </linearGradient>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d992" stop-opacity="0"/>
      <stop offset="30%" stop-color="#00d992" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#00d992" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d992" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d992" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00d992" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#00d992" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0"/>
    </linearGradient>
    <filter id="glo" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="chartGlow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background layers -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  <rect width="1500" height="500" fill="url(#glowLeft)"/>
  <rect width="1500" height="500" fill="url(#glowRight)"/>

  <!-- Grid -->
  <g stroke="#00d992" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="125" x2="1500" y2="125"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="187" y1="0" x2="187" y2="500"/>
    <line x1="375" y1="0" x2="375" y2="500"/>
    <line x1="562" y1="0" x2="562" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="937" y1="0" x2="937" y2="500"/>
    <line x1="1125" y1="0" x2="1125" y2="500"/>
    <line x1="1312" y1="0" x2="1312" y2="500"/>
  </g>

  <!-- Top + bottom border lines -->
  <line x1="0" y1="1" x2="1500" y2="1" stroke="url(#lineGrad)" stroke-width="1.5"/>
  <line x1="0" y1="499" x2="1500" y2="499" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- ─── LEFT: Logo mark (scaled from profile_v3, 0.55x, center at 160,250) ─── -->

  <!-- Mini rounded-square container -->
  <rect x="50" y="140" width="220" height="220" rx="48" fill="url(#iconBg)"/>
  <rect x="50" y="140" width="220" height="220" rx="48" fill="none" stroke="#00d992" stroke-width="1" stroke-opacity="0.25"/>

  <!-- Left chevron ">" scaled: tip→(161,250) arms→(109,205) and (109,295) -->
  <polyline
    points="109,205  161,250  109,295"
    fill="none"
    stroke="url(#ig)"
    stroke-width="23"
    stroke-linejoin="miter"
    stroke-linecap="square"
    filter="url(#glo)"
  />
  <!-- Right chevron "<" scaled: tip→(159,250) arms→(211,205) and (211,295) -->
  <polyline
    points="211,205  159,250  211,295"
    fill="none"
    stroke="url(#ig)"
    stroke-width="23"
    stroke-linejoin="miter"
    stroke-linecap="square"
    filter="url(#glo)"
  />

  <!-- ─── BRAND TEXT (right of logo) ─── -->

  <!-- Handle eyebrow -->
  <text x="298" y="188" font-family="'Courier New', monospace"
    font-size="13" fill="#00d992" letter-spacing="5" opacity="0.5">@TradeTerminal_</text>

  <!-- Brand name -->
  <text x="295" y="258" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="44" font-weight="900" fill="#ffffff"
    letter-spacing="3" opacity="0.95" filter="url(#textGlow)">TRADING TERMINAL</text>

  <!-- Divider rule -->
  <line x1="295" y1="278" x2="680" y2="278" stroke="#00d992" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Tagline -->
  <text x="295" y="302" font-family="'Courier New', monospace"
    font-size="13" fill="#00d992" letter-spacing="4" opacity="0.4">NEWS · SIGNALS · EXECUTION</text>

  <!-- Vertical section divider -->
  <line x1="720" y1="0" x2="720" y2="500" stroke="url(#divGrad)" stroke-width="1"/>

  <!-- ─── RIGHT SIDE: Chart ─── -->

  <!-- Chart area fill -->
  <polygon points="740,420 820,368 900,382 980,318 1060,285 1140,252 1220,220 1300,185 1380,155 1460,125 1500,110 1500,420"
    fill="url(#chartFill)"/>
  <!-- Chart trend line -->
  <polyline points="740,420 820,368 900,382 980,318 1060,285 1140,252 1220,220 1300,185 1380,155 1460,125 1500,110"
    fill="none" stroke="#00d992" stroke-width="2.5" stroke-opacity="0.5"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#chartGlow)"/>

  <!-- Candlesticks -->
  <g opacity="0.4">
    <line x1="840" y1="325" x2="840" y2="408" stroke="#00d992" stroke-width="1.2"/>
    <rect x="832" y="344" width="16" height="42" rx="2" fill="#00d992"/>

    <line x1="892" y1="338" x2="892" y2="400" stroke="#ef4444" stroke-width="1.2"/>
    <rect x="884" y="350" width="16" height="36" rx="2" fill="#ef4444"/>

    <line x1="944" y1="305" x2="944" y2="386" stroke="#00d992" stroke-width="1.2"/>
    <rect x="936" y="320" width="16" height="48" rx="2" fill="#00d992"/>

    <line x1="996" y1="278" x2="996" y2="360" stroke="#00d992" stroke-width="1.2"/>
    <rect x="988" y="292" width="16" height="46" rx="2" fill="#00d992"/>

    <line x1="1048" y1="290" x2="1048" y2="368" stroke="#ef4444" stroke-width="1.2"/>
    <rect x="1040" y="305" width="16" height="40" rx="2" fill="#ef4444"/>

    <line x1="1100" y1="255" x2="1100" y2="336" stroke="#00d992" stroke-width="1.2"/>
    <rect x="1092" y="268" width="16" height="44" rx="2" fill="#00d992"/>

    <line x1="1152" y1="232" x2="1152" y2="310" stroke="#00d992" stroke-width="1.2"/>
    <rect x="1144" y="244" width="16" height="42" rx="2" fill="#00d992"/>

    <line x1="1204" y1="242" x2="1204" y2="316" stroke="#ef4444" stroke-width="1.2"/>
    <rect x="1196" y="255" width="16" height="38" rx="2" fill="#ef4444"/>

    <line x1="1256" y1="205" x2="1256" y2="286" stroke="#00d992" stroke-width="1.2"/>
    <rect x="1248" y="218" width="16" height="44" rx="2" fill="#00d992"/>

    <line x1="1308" y1="182" x2="1308" y2="258" stroke="#00d992" stroke-width="1.2"/>
    <rect x="1300" y="195" width="16" height="42" rx="2" fill="#00d992"/>

    <line x1="1360" y1="162" x2="1360" y2="240" stroke="#00d992" stroke-width="1.2"/>
    <rect x="1352" y="175" width="16" height="40" rx="2" fill="#00d992"/>

    <line x1="1412" y1="142" x2="1412" y2="220" stroke="#ef4444" stroke-width="1.2"/>
    <rect x="1404" y="155" width="16" height="38" rx="2" fill="#ef4444"/>
  </g>

  <!-- Corner accents -->
  <path d="M18 70 L18 18 L70 18" fill="none" stroke="#00d992" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M1430 18 L1482 18 L1482 70" fill="none" stroke="#00d992" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M18 430 L18 482 L70 482" fill="none" stroke="#00d992" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>
  <path d="M1430 482 L1482 482 L1482 430" fill="none" stroke="#00d992" stroke-width="2" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Live badge top-right -->
  <rect x="1390" y="22" width="80" height="22" rx="11" fill="#00d992" fill-opacity="0.12" stroke="#00d992" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="1403" cy="33" r="4" fill="#00d992" filter="url(#glo)"/>
  <text x="1452" y="38" font-family="'Courier New', monospace" font-size="11"
    fill="#00d992" text-anchor="middle" letter-spacing="2" font-weight="700">LIVE</text>

  <!-- URL bottom-left -->
  <text x="50" y="462" font-family="'Courier New', monospace" font-size="10"
    fill="#00d992" letter-spacing="2" opacity="0.3">cryptoterminal-production.up.railway.app</text>
</svg>
