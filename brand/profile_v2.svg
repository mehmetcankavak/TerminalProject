<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bgMain" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#0a1a14"/>
      <stop offset="100%" stop-color="#020808"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d992" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#00d992" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ttGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffb3"/>
      <stop offset="50%" stop-color="#00d992"/>
      <stop offset="100%" stop-color="#00a86b"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d992" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00d992" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d992"/>
      <stop offset="100%" stop-color="#00d992" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgMain)"/>
  <circle cx="200" cy="200" r="200" fill="url(#glowCenter)"/>

  <!-- Subtle grid (clipped to circle) -->
  <g clip-path="url(#circleClip)" stroke="#00d992" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="67" x2="400" y2="67"/>
    <line x1="0" y1="134" x2="400" y2="134"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="267" x2="400" y2="267"/>
    <line x1="0" y1="334" x2="400" y2="334"/>
    <line x1="67"  y1="0" x2="67"  y2="400"/>
    <line x1="134" y1="0" x2="134" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="267" y1="0" x2="267" y2="400"/>
    <line x1="334" y1="0" x2="334" y2="400"/>
  </g>

  <!-- Outer ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="url(#ringGrad)" stroke-width="1.5"/>

  <!-- Inner ring -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#00d992" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Mini chart bars bottom -->
  <g clip-path="url(#circleClip)" opacity="0.5">
    <rect x="60"  y="295" width="14" height="45" rx="2" fill="url(#barGrad)"/>
    <rect x="82"  y="278" width="14" height="62" rx="2" fill="url(#barGrad)"/>
    <rect x="104" y="288" width="14" height="52" rx="2" fill="#ff3b5c" fill-opacity="0.7"/>
    <rect x="126" y="265" width="14" height="75" rx="2" fill="url(#barGrad)"/>
    <rect x="148" y="272" width="14" height="68" rx="2" fill="url(#barGrad)"/>
    <rect x="238" y="268" width="14" height="72" rx="2" fill="#ff3b5c" fill-opacity="0.7"/>
    <rect x="260" y="252" width="14" height="88" rx="2" fill="url(#barGrad)"/>
    <rect x="282" y="258" width="14" height="82" rx="2" fill="url(#barGrad)"/>
    <rect x="304" y="242" width="14" height="98" rx="2" fill="url(#barGrad)"/>
    <rect x="326" y="270" width="14" height="70" rx="2" fill="#ff3b5c" fill-opacity="0.7"/>
  </g>

  <!-- Trend line -->
  <polyline clip-path="url(#circleClip)"
    points="60,290 100,265 140,275 180,248 220,238 260,218 300,205 340,188"
    fill="none" stroke="#00d992" stroke-width="2" stroke-opacity="0.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main TT text -->
  <text x="200" y="213" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="110" font-weight="900" fill="url(#ttGrad)"
    text-anchor="middle" letter-spacing="-6"
    filter="url(#textGlow)">TT</text>

  <!-- Top label -->
  <text x="200" y="148" font-family="'Courier New', monospace"
    font-size="11" fill="#00d992" text-anchor="middle"
    letter-spacing="5" opacity="0.5">TRADE · TERMINAL</text>

  <!-- Bottom divider line -->
  <line x1="140" y1="238" x2="260" y2="238" stroke="#00d992" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Live dot -->
  <circle cx="200" cy="256" r="3.5" fill="#00d992" filter="url(#softGlow)"/>
  <circle cx="200" cy="256" r="7" fill="none" stroke="#00d992" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Tick marks on outer ring -->
  <g stroke="#00d992" stroke-opacity="0.4" stroke-width="1.5" stroke-linecap="round">
    <line x1="200" y1="10" x2="200" y2="22"/>
    <line x1="200" y1="378" x2="200" y2="390"/>
    <line x1="10" y1="200" x2="22" y2="200"/>
    <line x1="378" y1="200" x2="390" y2="200"/>
  </g>
  <g stroke="#00d992" stroke-opacity="0.2" stroke-width="1" stroke-linecap="round">
    <line x1="334" y1="46" x2="328" y2="55"/>
    <line x1="66" y1="354" x2="72" y2="345"/>
    <line x1="66" y1="46" x2="72" y2="55"/>
    <line x1="334" y1="354" x2="328" y2="345"/>
  </g>
</svg>
