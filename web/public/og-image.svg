<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d992"/>
      <stop offset="100%" stop-color="#00b87a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#111111" stroke-width="1" opacity="0.8">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Top border accent -->
  <rect width="1200" height="2" fill="url(#accent)" opacity="0.6"/>

  <!-- Logo -->
  <text x="80" y="108" font-family="monospace" font-size="32" fill="#555555" font-weight="400">[</text>
  <text x="100" y="108" font-family="monospace" font-size="32" fill="#ffffff" font-weight="700">TT</text>
  <text x="136" y="108" font-family="monospace" font-size="32" fill="#555555" font-weight="400">]</text>
  <text x="163" y="108" font-family="monospace" font-size="13" fill="#444444" letter-spacing="3" font-weight="500">TRADING TOOLS</text>

  <!-- Live indicator -->
  <circle cx="80" cy="168" r="5" fill="#00d992" opacity="0.9"/>
  <text x="95" y="174" font-family="monospace" font-size="12" fill="#00d992" letter-spacing="2">LIVE — MARKETS OPEN</text>

  <!-- Main headline -->
  <text x="80" y="270" font-family="monospace" font-size="64" fill="#ffffff" font-weight="700" letter-spacing="-1">MONITOR THE CRYPTO</text>
  <text x="80" y="348" font-family="monospace" font-size="64" fill="url(#accent)" font-weight="700" letter-spacing="-1">MARKET WITH PRO EYES.</text>

  <!-- Subtext -->
  <text x="80" y="410" font-family="monospace" font-size="18" fill="#666666">Liquidations · Funding Rates · Whale Transfers · Custom Alerts</text>
  <text x="80" y="438" font-family="monospace" font-size="18" fill="#666666">Real-time WebSocket data from 4 exchanges. Zero latency.</text>

  <!-- Stats -->
  <text x="80" y="510" font-family="monospace" font-size="13" fill="#333333">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</text>

  <text x="80" y="548" font-family="monospace" font-size="22" fill="#ffffff" font-weight="700">2,400+</text>
  <text x="80" y="572" font-family="monospace" font-size="12" fill="#555555">Active Traders</text>

  <text x="280" y="548" font-family="monospace" font-size="22" fill="#ffffff" font-weight="700">99.9%</text>
  <text x="280" y="572" font-family="monospace" font-size="12" fill="#555555">Uptime</text>

  <text x="460" y="548" font-family="monospace" font-size="22" fill="#ffffff" font-weight="700">&lt;50ms</text>
  <text x="460" y="572" font-family="monospace" font-size="12" fill="#555555">Data Latency</text>

  <text x="640" y="548" font-family="monospace" font-size="22" fill="#ffffff" font-weight="700">4</text>
  <text x="640" y="572" font-family="monospace" font-size="12" fill="#555555">Exchanges</text>

  <!-- Domain -->
  <text x="1120" y="572" font-family="monospace" font-size="13" fill="#333333" text-anchor="end">tradingtools.app</text>
</svg>
