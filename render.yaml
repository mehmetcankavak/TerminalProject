services:
  - type: web
    name: cryptoterminal
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: MINIMAL_MODE
        value: "1"
    healthCheckPath: /
    autoDeploy: true
